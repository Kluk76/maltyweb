/* ============================================================
   UTILITIES
   ============================================================ */
function parseDT(iso) {
  return new Date(iso.replace('T', ' '));
}

function computeDuration(start, end) {
  const s = parseDT(start), e = parseDT(end);
  const diffMs = e - s;
  const totalMin = Math.round(diffMs / 60000);
  const h = Math.floor(totalMin / 60);
  const m = totalMin % 60;
  return `${h}h${String(m).padStart(2, '0')}`;
}

function formatDateTime(iso) {
  // "2026-06-12T20:00" → "2026-06-12 · 20:00"
  return iso.replace('T', ' · ');
}

function formatFrenchDate(isoDate) {
  const MONTHS = ['janvier','février','mars','avril','mai','juin',
                  'juillet','août','septembre','octobre','novembre','décembre'];
  const [y, m, d] = isoDate.split('-');
  return `${parseInt(d)} ${MONTHS[parseInt(m)-1]} ${y}`;
}

function esc(s) {
  return String(s)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;')
    .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function fmtGravity(v) { return v.toFixed(1) + '°P'; }
function fmtPh(v)      { return v.toFixed(2); }
function fmtVol(v)     { return v.toFixed(1) + ' hL'; }
function fmtDil(v)     { return v.toFixed(1) + ' hL'; }

    const dotR = 2;
    // Leader line from tag bottom to anchor point (vessel top)
    const leaderY1 = tagY + tagH; // bottom of tag
    const leaderY2 = anchorY - 2; // vessel top

    const accentRing = emphasis ? `
      <rect x="${tagX-2}" y="${tagY-2}" width="${tagW+4}" height="${tagH+4}" rx="3"
            fill="none" stroke="#8b5e2a" stroke-width="0.6" opacity="0.5"/>
    ` : '';

    return `
      <g aria-label="${esc(label)}: ${esc(value)}">
        <!-- leader dot on vessel -->
        <circle cx="${cx}" cy="${anchorY}" r="${dotR}" fill="#8a7250"/>
        <!-- leader line: from vessel anchor up to tag bottom -->
        <line x1="${cx}" y1="${anchorY}" x2="${cx}" y2="${leaderY1}"
              stroke="#a08060" stroke-width="0.8"/>
        ${accentRing}
        <!-- tag background -->
        <rect x="${tagX}" y="${tagY}" width="${tagW}" height="${tagH}" rx="2"
              fill="rgba(241,232,212,0.97)" stroke="#8a7250" stroke-width="0.8"/>
        <!-- horizontal divider -->
        <line x1="${tagX+1}" y1="${dividerY}" x2="${tagX+tagW-1}" y2="${dividerY}"
              stroke="#a08060" stroke-width="0.7" opacity="0.8"/>
        <!-- glyph (top half) -->
        <text x="${cx}" y="${tagY + 10}" text-anchor="middle" dominant-baseline="middle"
              font-family="'JetBrains Mono',monospace" font-size="9" font-weight="400"
              fill="#5a3a12" letter-spacing="0.08em">${esc(glyph)}</text>
        <!-- value (bottom half) -->
        <text x="${cx}" y="${dividerY + (tagH - 14)/2 + 4}" text-anchor="middle" dominant-baseline="middle"
              font-family="'JetBrains Mono',monospace" font-size="${valSize}" font-weight="${valWeight}"
              fill="#241b10">${esc(value)}</text>
      </g>
    `;
  }

  function drawPipe(x1, x2, y, isLast) {
    const midX = (x1 + x2) / 2;
    if (isLast) {
      return `
        <path d="M${x1} ${y} Q${midX} ${y+10} ${x2} ${y+14}"
              stroke="#a08060" stroke-width="5" fill="none"/>
        <path class="pipe-flow" d="M${x1} ${y} Q${midX} ${y+10} ${x2} ${y+14}"
              stroke="#c8b48a" stroke-width="1.5" fill="none"
              stroke-dasharray="6 4" opacity="0.6"/>
        <polygon points="${x2-7},${y+9} ${x2+2},${y+14} ${x2-7},${y+19}"
                 fill="#a08060"/>
      `;
    }
    return `
      <line x1="${x1}" y1="${y-2.5}" x2="${x2}" y2="${y-2.5}"
            stroke="#a08060" stroke-width="1.8"/>
      <line x1="${x1}" y1="${y+2.5}" x2="${x2}" y2="${y+2.5}"
            stroke="#a08060" stroke-width="1.8"/>
      <line class="pipe-flow" x1="${x1}" y1="${y}" x2="${x2}" y2="${y}"
            stroke="#c8b48a" stroke-width="3" stroke-dasharray="6 4" opacity="0.6"/>
      <polygon points="${midX-1},${y-8} ${midX+9},${y} ${midX-1},${y+8}"
               fill="#a08060"/>
    `;
  }

  let svgParts = [`<svg viewBox="0 0 ${VB_W} ${VB_H}" xmlns="http://www.w3.org/2000/svg"
    role="img" aria-label="Schéma de brassage — Brassin ${esc(brew.brew)}">`];
  svgParts.push(defs);

  svgParts.push(`<rect width="${VB_W}" height="${VB_H}" fill="url(#grid-sm-${idx})"/>`);
  svgParts.push(`<rect width="${VB_W}" height="${VB_H}" fill="url(#grid-${idx})"/>`);

  const pipeY = 185;
  for (let i = 0; i < stations.length - 1; i++) {
    const x1 = stations[i].x + 65;
    const x2 = stations[i+1].x - 65;
    const isLast = (i === stations.length - 2);
    svgParts.push(`<g class="station-${i+1}">`);
    svgParts.push(drawPipe(x1, x2, pipeY, isLast));
    svgParts.push('</g>');
  }

  stations.forEach((st, i) => {
    const fg = i === 3
      ? gravToFill(brew.final_gravity)
      : i === 0
        ? gravToFill(brew.firstwort_gravity)
        : i === 1
          ? gravToFill(brew.pfannevoll_gravity)
          : gravToFill(brew.kochwurze_gravity);

    const fillColor = FILL_COLORS[i];

    svgParts.push(`<g class="station-${i}">`);

    if (st.type === 'mash') {
      svgParts.push(vesselMash(st.x, fg, fillColor, i));
    } else if (st.type === 'cct') {
      svgParts.push(vesselCCT(st.x, fg, fillColor, i));
    } else {
      svgParts.push(vesselKettle(st.x, fg, st.type, fillColor, i));
    }

    const labelY = 380;
    svgParts.push(`
      <text x="${st.x}" y="${labelY}" text-anchor="middle"
            font-family="'DM Sans',sans-serif" font-size="11" font-weight="700"
            fill="#5a3a12" letter-spacing="0.06em">${esc(st.label)}</text>
    `);

    // Instrument tags
    const stReadings = readings[i];
    const spacing = (i === 3) ? 58 : 52;
    const totalW = (stReadings.length - 1) * spacing;
    const startBx = st.x - totalW / 2;
    const vesselTopY = (st.type === 'mash') ? 115 : (st.type === 'cct') ? 88 : 105;

    stReadings.forEach((rd, ri) => {
      const bx = startBx + ri * spacing;
      svgParts.push(drawInstrumentTag(bx, vesselTopY, rd.glyph, rd.value, rd.label, rd.emphasis || false));
    });

    svgParts.push('</g>');
  });

  svgParts.push('</svg>');
  return svgParts.join('\n');
}

/* ============================================================
   TIMINGS STRIP
   ============================================================ */
function renderTimingsStrip(brew) {
  const duration = computeDuration(brew.start, brew.end);
  const startFmt = brew.start.replace('T', ' · ');
  const endFmt   = brew.end.replace('T', ' · ');
  return `
    <div class="timings-strip">
      <div class="timings-cell">
        <div class="timings-cell__label">Début</div>
        <div class="timings-cell__val">${esc(startFmt)}</div>
      </div>
      <div class="timings-cell">
        <div class="timings-cell__label">Fin</div>
        <div class="timings-cell__val">${esc(endFmt)}</div>
      </div>
      <div class="timings-cell">
        <div class="timings-cell__label">Durée</div>
        <div class="timings-cell__val timings-cell__val--accent">${esc(duration)}</div>
      </div>
      <div class="timings-cell">
        <div class="timings-cell__label">Dilution</div>
        <div class="timings-cell__val">${esc(fmtDil(brew.batch_dilution))}</div>
      </div>
    </div>
  `;
}

      <div class="yeast-panel__fields">

          <div class="yeast-field__label">Souche</div>

/* ============================================================
   INGREDIENTS DOCKET
   ============================================================ */
const CAT_META = {
  malt:        { label: "Malt",          chip: "cat-chip--malt",    color: "#8a5210" },
  hops_kettle: { label: "Houblon cuve",  chip: "cat-chip--hops-k",  color: "#567020" },
  hops_dry:    { label: "Houblon cru",   chip: "cat-chip--hops-d",  color: "#7a8f3a" },
  mineral:     { label: "Minéral",       chip: "cat-chip--mineral",  color: "#2d7a88" },
  process:     { label: "Process",       chip: "cat-chip--process",  color: "#5a4a8c" }
};

const CAT_ORDER = ['malt', 'hops_kettle', 'hops_dry', 'mineral', 'process'];

function renderDocket(ingredients) {
  // Group by category
  const groups = {};
  CAT_ORDER.forEach(c => { groups[c] = []; });
  ingredients.forEach(ing => {
    if (groups[ing.category]) groups[ing.category].push(ing);
    else { groups[ing.category] = [ing]; }
  });

  // Total weight (kg only)
  const totalKg = ingredients.filter(i => i.unit === 'kg')
    .reduce((s, i) => s + i.qty, 0);

  let catHtml = '';
  CAT_ORDER.forEach(cat => {
    const rows = groups[cat];
    if (!rows || rows.length === 0) return;
    const meta = CAT_META[cat] || { label: cat, chip: '' };
    catHtml += `
      <div class="docket-category">
        <div class="docket-cat-header">
          <span class="cat-chip ${meta.chip}"></span>
          <span class="cat-name">${esc(meta.label)}</span>
        </div>
        ${rows.map(ing => `
          <div class="docket-row">
            <span class="docket-row__name">${esc(ing.name)}</span>
            <span class="docket-row__qty">${esc(ing.qty)} ${esc(ing.unit)}</span>
            <span class="docket-row__lot">${esc(ing.lot)}</span>
            <span class="conf-dot conf-dot--${esc(ing.confidence)}"
                  title="Confiance : ${esc(ing.confidence)}"></span>
          </div>
        `).join('')}
      </div>
    `;
  });

  return `
    <div class="docket">
      <div class="docket__header">
        <span class="docket__title">Dossier d'ingrédients</span>
        <span class="docket__total-label">${ingredients.length} ingrédients</span>
      </div>
      ${catHtml}
      <div class="docket__footer">
        <span class="docket__total-label">Total malt + houblon (kg) :</span>
        <span class="docket__total-kg">${totalKg.toFixed(1)} kg</span>
      </div>
    </div>
  `;
}

/* ============================================================
   BATCH VIEW RENDERER

        <div class="fiche-header__left">
          <div class="fiche-header__overline">Schéma de brassage</div>
          <h1 class="fiche-recipe-name">${esc(b.recipe)}</h1>
          <div class="fiche-pills">
            <span class="pill ${pillClass}">${esc(classLabel)}</span>
            <span class="pill pill--core">${esc(b.subtype)}</span>
          </div>
        </div>
        <div class="fiche-header__right">
          <div class="fiche-meta-cell">
            <span class="fiche-meta-cell__label">Lot</span>
            <span class="fiche-meta-cell__val">${esc(b.lot)}</span>
          </div>
          <div class="fiche-meta-cell">
            <span class="fiche-meta-cell__label">Date</span>
            <span class="fiche-meta-cell__val">${esc(frDate)}</span>
          </div>
          <div class="fiche-meta-cell">
            <span class="fiche-meta-cell__label">CCT</span>
            <span class="fiche-meta-cell__val">CCT ${esc(b.cct)}</span>
          </div>
          <div class="fiche-meta-cell">
            <span class="fiche-meta-cell__label">Brasseur</span>
            <span class="fiche-meta-cell__val">${esc(b.operator)}</span>
          </div>
          <div class="fiche-meta-cell">
            <span class="fiche-meta-cell__label">&nbsp;</span>
            <span class="fiche-meta-cell__val"></span>
          </div>
          <div class="fiche-meta-cell">
            <span class="fiche-meta-cell__label">&nbsp;</span>
            <span class="fiche-meta-cell__val"></span>
          </div>
        </div>
      </div>
    </div>
  `;

  // Per-brew schematics
  b.brews.forEach((brew, i) => {
    html += `
      <div class="brew-section">
        <div class="brew-section-label">Brassin ${esc(brew.brew)}</div>

  // Comments

      <div class="comments-block__label">Notes de brassage</div>
      <p class="comments-block__text">${esc(b.comments)}</p>
    </div>
  `;

  return html;
}

/* ============================================================
   DAY VIEW — miniature CCT card SVG
   ============================================================ */
function miniCCTSvg(og, classification) {
  const w = 68, cylH = 52, coneH = 22;
  const x = 6, y = 10;
  const gravMin = 10, gravMax = 16;
  const fillLevel = Math.min(0.85, Math.max(0.15, (og - gravMin) / (gravMax - gravMin)));
  const totalH = cylH + coneH;
  const liqH = Math.round(totalH * fillLevel * 0.72);
  const coneY = y + cylH;
  const coneBottom = coneY + coneH;
  const cx = x + w / 2;
  const liqFillColor = classification === 'Neb'
    ? 'rgba(86,112,32,0.18)' : 'rgba(47,85,117,0.18)';
  const liqY = coneY - liqH + coneH * 0.25;

  return `<svg width="80" height="95" viewBox="0 0 80 95" xmlns="http://www.w3.org/2000/svg"
    aria-label="Cuve CCT — OG ${og}°P">
    <defs>
      <pattern id="mhatch" patternUnits="userSpaceOnUse" width="5" height="5" patternTransform="rotate(45)">
        <line x1="0" y1="0" x2="0" y2="5" stroke="#c8b48a" stroke-width="0.5" opacity="0.35"/>
      </pattern>
      <clipPath id="mclip">
        <polygon points="${x},${y} ${x+w},${y} ${x+w},${coneY} ${cx},${coneBottom} ${x},${coneY}"/>
      </clipPath>
    </defs>
    <polygon points="${x},${y} ${x+w},${y} ${x+w},${coneY} ${cx},${coneBottom} ${x},${coneY}"
             fill="url(#mhatch)"/>
    <rect x="${x}" y="${liqY}" width="${w}" height="${liqH + coneH}"
          fill="${liqFillColor}" clip-path="url(#mclip)"/>
    <polygon points="${x},${y} ${x+w},${y} ${x+w},${coneY} ${cx},${coneBottom} ${x},${coneY}"
             fill="none" stroke="#5a3a12" stroke-width="1.8"/>
    <rect x="${x-2}" y="${y-3}" width="${w+4}" height="5" rx="1.5"
          fill="#dcc9a4" stroke="#5a3a12" stroke-width="1.2"/>
  </svg>`;
}

function renderDayView(data) {
  const MONTHS = ['janvier','février','mars','avril','mai','juin',
                  'juillet','août','septembre','octobre','novembre','décembre'];
  const [y, m, d] = data.day.date.split('-');
  const dateFr = `${parseInt(d)} ${MONTHS[parseInt(m)-1]} ${y}`;

  let html = `
    <div class="day-header">
      Vue journalière
      <span>${esc(dateFr)}</span>
    </div>
    <div class="day-cards">
  `;

  data.day.brews.forEach(b => {
    const classLabel = b.classification === 'Neb' ? 'Nébuleuse' : 'Contract';
    const pillClass  = b.classification === 'Neb' ? 'pill--neb' : 'pill--contract';

    html += `
      <div class="day-card" tabindex="0" role="button"
           aria-label="Voir le brassin ${esc(b.recipe)} Lot ${esc(b.lot)}">
        <div class="day-card__vessel">
          ${miniCCTSvg(b.og, b.classification)}
        </div>
        <div class="day-card__recipe">${esc(b.recipe)}</div>
        <div class="day-card__lot">Lot ${esc(b.lot)}</div>
        <div class="day-card__pill">
          <span class="pill ${pillClass}">${esc(classLabel)}</span>
        </div>
        <div class="day-card__readings">
          <div class="day-reading">
            <div class="day-reading__label">OG</div>
            <div class="day-reading__val day-reading__val--hero">${b.og.toFixed(1)}°P</div>
          </div>
          <div class="day-reading">
            <div class="day-reading__label">pH</div>
            <div class="day-reading__val day-reading__val--hero">${b.ph.toFixed(2)}</div>
          </div>
          <div class="day-reading">
            <div class="day-reading__label">Volume</div>
            <div class="day-reading__val">${b.volume.toFixed(1)} hL</div>
          </div>
          <div class="day-reading">
            <div class="day-reading__label">Durée</div>
            <div class="day-reading__val">${esc(b.duration)}</div>
          </div>
        </div>
      </div>
    `;
  });

  html += '</div>';
  return html;
}

/* ============================================================
   INIT
   ============================================================ */
function init() {
  // Render both views
  document.getElementById('view-batch').innerHTML = renderBatchView(DATA);
  document.getElementById('view-day').innerHTML   = renderDayView(DATA);

  // Toggle logic
  const btnBatch = document.getElementById('btn-batch');
  const btnDay   = document.getElementById('btn-day');
  const vBatch   = document.getElementById('view-batch');
  const vDay     = document.getElementById('view-day');

  function activateBatch() {
    btnBatch.classList.add('view--active');
    btnBatch.setAttribute('aria-pressed', 'true');
    btnDay.classList.remove('view--active');
    btnDay.setAttribute('aria-pressed', 'false');
    vBatch.classList.remove('view--hidden');
    vDay.classList.remove('view--visible');
  }

  function activateDay() {
    btnDay.classList.add('view--active');
    btnDay.setAttribute('aria-pressed', 'true');
    btnBatch.classList.remove('view--active');
    btnBatch.setAttribute('aria-pressed', 'false');
    vDay.classList.add('view--visible');
    vBatch.classList.add('view--hidden');
  }

  btnBatch.addEventListener('click', activateBatch);
  btnDay.addEventListener('click', activateDay);

  [btnBatch, btnDay].forEach(btn => {
    btn.addEventListener('keydown', e => {
      if (e.key === 'Enter' || e.key === ' ') {
        e.preventDefault();
        btn.click();
      }
    });
  });
}

document.addEventListener('DOMContentLoaded', init);
</script>
